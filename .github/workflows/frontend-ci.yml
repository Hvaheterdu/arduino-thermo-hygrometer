name: Frontend CI

on:
  push:
    branches: ["main"]
    paths:
      - "app/**"
      - ".github/workflows/frontend-ci.yml"
  pull_request:
    paths:
      - "app/**"
      - ".github/workflows/frontend-ci.yml"

jobs:
  frontend-quality:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: app
    steps:
      - name: Checkout repository
        uses: actions/checkout@v7

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: "24"
          cache: "npm"
          cache-dependency-path: app/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run frontend quality suite
        run: npm run app:format:check && npm run app:lint && npm run app:build:dev

      - name: Run frontend tests
        run: npm run app:test:run
