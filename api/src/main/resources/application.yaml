cors:
  allowed-headers: [ Accept, Content-Type, X-API-KEY ]
  allowed-methods: [ GET, POST, DELETE ]
  allowed-origins: [ https://localhost:3000 ]

info:
  contact:
    name: Burhan Mohammad Sarfraz
    email: burhan.mohammad.sarfraz@outlook.com
  description: A Java RESTful API for an Arduino Thermo Hygrometer IoT device.
  license:
    name: MIT license
    url: https://mit-license.org/
  title: Arduino Thermo Hygrometer API.
  version: ${build.version}

management:
  endpoint:
    health:
      probes:
        enabled: true
      show-components: when_authorized
      show-details: when_authorized
  endpoints:
    web:
      exposure:
        include: health, info, metrics

security:
  api-key: ${API_KEY}
  api-header-name: X-API-KEY
  api-roles: [ ACTUATOR, API_ADMIN ]
  api-scheme-name: ApiKeyAuth

server:
  port: 5000

spring:
  application:
    group: api
    name: api
  flyway:
    connect-retries: 3
    enabled: true
    locations: classpath:db/migration
    validate-migration-naming: true
  mvc:
    problemdetails:
      enabled: true
