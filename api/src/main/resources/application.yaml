cors:
  allowed-headers:
    - X-API-KEY
    - Accept
    - Content-Type
  allowed-methods:
    - GET
    - POST
    - DELETE
  allowed-origins: http://localhost:3000

info:
  contact:
    name: Burhan Mohammad Sarfraz
    email: burhan.mohammad.sarfraz@outlook.com
  description: A Java Web API for an Arduino Thermo Hygrometer IoT device.
  license:
    name: MIT license
    url: https://mit-license.org/
  title: Arduino Thermo Hygrometer API.
  version: ${build.version}

management:
  endpoint:
    health:
      show-components: when_authorized
      show-details: when_authorized
  endpoints:
    web:
      exposure:
        include: "health,info"

security:
  api-key: ${API_KEY}
  api-header: X-API-KEY
  api-role: ROLE-API
  api-scheme-name: ApiKeyAuth
  whitelist:
    - /swagger-ui/**
    - /v3/api-docs/**

server:
  port: 5000

spring:
  profiles:
    active: local
  application:
    group: api
    name: api
  datasource:
    driver-class-name: org.postgresql.Driver
    username: postgres-local
    password: postgres-local
    url: jdbc:postgresql://localhost:5432/arduinothermohygrometer-local
  flyway:
    connect-retries: 3
    enabled: true
    locations: classpath:db/migration
    validate-migration-naming: true

springdoc:
  api-docs:
    enabled: true
  packages-to-scan: api.arduinothermohygrometer
  swagger-ui:
    enabled: true
    operations-sorter: method
    path: /swagger-ui.html