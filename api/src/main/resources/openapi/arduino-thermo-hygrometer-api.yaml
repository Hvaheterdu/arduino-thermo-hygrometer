      responses:
        "200":
          description: Batteries found.
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/BatteryDto"
        "404":
          $ref: "https://api.swaggerhub.com/domains/smartbear-public/ProblemDetails/1.0.0#/components/responses/NotFound"

components:
  schemas:
    ProblemDetails:
      type: object
      properties:
        type:
          type: string
          format: uri-reference
          description: URI reference identifying the problem type.
        title:
          type: string
          description: A short, human-readable summary of the problem type.
        status:
          type: integer
          description: HTTP status code for this error occurrence.
        detail:
          type: string
          description: Explanation specific to this occurrence of the problem.
        instance:
          type: string
          format: uri-reference
          description: URI reference identifying the specific occurrence of the problem.

    TemperatureDto:
      type: object
      properties:
        registeredAt:
          type: string
          format: date-time
          example: "2017-07-21T17:32:28Z"
        temp:
          type: number
          format: double
          minimum: -55
          maximum: 125
          example: 100
      required:
        - registeredAt
        - temp

    HumidityDto:
      type: object
      properties:
        registeredAt:
          type: string
          format: date-time
          example: "2017-07-21T17:32:28Z"
        airHumidity:
          type: number
          format: double
          minimum: 20
          maximum: 90
          example: 70
      required:
        - registeredAt
        - airHumidity

    BatteryDto:
      type: object
      properties:
        registeredAt:
          type: string
          format: date-time
          example: "2017-07-21T17:32:28Z"
        batteryStatus:
          type: integer
          format: int32
          minimum: 0
          maximum: 100
          example: 50
      required:
        - registeredAt
        - batteryStatus
