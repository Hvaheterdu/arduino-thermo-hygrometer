openapi: 3.1.0
info:
  title: Arduino Thermo Hygrometer API.
  description: A Java Web API for an Arduino Thermo Hygrometer IoT device.
  contact:
    name: Burhan Mohammad Sarfraz
    email: burhan.mohammad.sarfraz@outlook.com
  license:
    name: MIT license
    url: https://mit-license.org/
  version: 1.0.0-SNAPSHOT

servers:
  - url: http://localhost:5000
    description: Local development server.

tags:
  - name: Battery component.
    description: Battery status of arduino device.
  - name: Temperature component.
    description: Temperature measured by arduino device.
  - name: Humidity component.
    description: Humidity measured by arduino device.

paths:
  /api/temperatures:
    post:
      tags:
        - Temperature component.
      summary: Create measured temperature.
      operationId: create
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/TemperatureDto"
        required: true
      responses:
        "201":
          description: Temperature created.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TemperatureDto"
        "400":
          $ref: "https://api.swaggerhub.com/domains/smartbear-public/ProblemDetails/1.0.0#/components/responses/BadRequest"

  /api/humidities:
    post:
      tags:
        - Humidity component.
      summary: Create measured humidity.
      operationId: create_1
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/HumidityDto"
        required: true
      responses:
        "201":
          description: Humidity created.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HumidityDto"
        "400":
          $ref: "https://api.swaggerhub.com/domains/smartbear-public/ProblemDetails/1.0.0#/components/responses/BadRequest"

  /api/batteries:
    post:
      tags:
        - Battery component.
      summary: Create battery.
      operationId: create_2
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/BatteryDto"
        required: true
      responses:
        "201":
          description: Battery created.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BatteryDto"
        "400":
          $ref: "https://api.swaggerhub.com/domains/smartbear-public/ProblemDetails/1.0.0#/components/responses/BadRequest"

  /api/temperatures/{id}:
    get:
      tags:
        - Temperature component.
      summary: Retrieve measured temperature by id.
      operationId: getTemperatureById
      parameters:
        - name: id
          in: path
          description: Identifier for measured temperature.
          required: true
          schema:
            type: string
            format: uuid
            example: "00000000-0000-0000-0000-000000000000"
      responses:
        "200":
          description: Temperature found.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TemperatureDto"
        "404":
          $ref: "https://api.swaggerhub.com/domains/smartbear-public/ProblemDetails/1.0.0#/components/responses/NotFound"
    delete:
      tags:
        - Temperature component.
      summary: Delete measured temperature by id.
      operationId: deleteTemperatureDtoById
      parameters:
        - name: id
          in: path
          description: Identifier for measured temperature.
          required: true
          schema:
            type: string
            format: uuid
            example: "00000000-0000-0000-0000-000000000000"
      responses:
        "204":
          description: Temperature deleted.
        "404":
          $ref: "https://api.swaggerhub.com/domains/smartbear-public/ProblemDetails/1.0.0#/components/responses/NotFound"

  /api/temperatures/timestamp:
    get:
      tags:
        - Temperature component.
      summary: Retrieve measured temperature by timestamp.
      operationId: getTemperatureByTimestamp
      parameters:
        - name: timestamp
          in: query
          description: Timestamp for measured temperature.
          required: true
          schema:
            type: string
            format: date-time
            example: "2017-07-21T17:32:28Z"
      responses:
        "200":
          description: Temperature found.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TemperatureDto"
        "404":
          $ref: "https://api.swaggerhub.com/domains/smartbear-public/ProblemDetails/1.0.0#/components/responses/NotFound"
    delete:
      tags:
        - Temperature component.
      summary: Delete measured temperature by timestamp.
      operationId: deleteTemperatureByTimestamp
      parameters:
        - name: timestamp
          in: query
          description: Timestamp for measured temperature.
          required: true
          schema:
            type: string
            format: date-time
            example: "2017-07-21T17:32:28Z"
      responses:
        "204":
          description: Temperature deleted.
        "404":
          $ref: "https://api.swaggerhub.com/domains/smartbear-public/ProblemDetails/1.0.0#/components/responses/NotFound"

  /api/temperatures/date:
    get:
      tags:
        - Temperature component.
      summary: Retrieve measured temperatures by date.
      operationId: getTemperaturesByDate
      parameters:
        - name: date
          in: query
          description: Date for measured temperatures.
          required: true
          schema:
            type: string
            format: date
            example: "2017-07-21"
      responses:
        "200":
          description: Temperatures found.
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/TemperatureDto"
        "404":
          $ref: "https://api.swaggerhub.com/domains/smartbear-public/ProblemDetails/1.0.0#/components/responses/NotFound"

