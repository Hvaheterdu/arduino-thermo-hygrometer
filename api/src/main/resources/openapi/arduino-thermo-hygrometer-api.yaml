              $ref: "#/components/examples/Unauthorized"
        "403":
          description: Forbidden.
          $ref: "#/components/responses/ProblemDetails"
          examples:
            forbidden:
              $ref: "#/components/examples/Forbidden"
        "404":
          description: Not Found.
          $ref: "#/components/responses/ProblemDetails"
          examples:
            notFound:
              $ref: "#/components/examples/NotFound"
        "429":
