      tags:
        - Humidity
      summary: Retrieve measured humidity by date or timestamp.
      description: Retrieves the measured humidity from the Arduino device by date or timestamp.
      operationId: getHumiditiesByDateOrTimestamp
      parameters:
        - $ref: "#/components/parameters/RegisteredAt"
