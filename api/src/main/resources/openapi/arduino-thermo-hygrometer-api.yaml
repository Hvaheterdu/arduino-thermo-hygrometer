          required: true
          schema:
            type: string
            format: uuid
            example: "00000000-0000-0000-0000-000000000000"
      responses:
        "200":
          description: Humidity found.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HumidityDto"
        "404":
          $ref: "https://api.swaggerhub.com/domains/smartbear-public/ProblemDetails/1.0.0#/components/responses/NotFound"
    delete:
      tags:
        - Humidity component.
      summary: Delete measured humidity by id.
      operationId: deleteHumidityDtoById
      parameters:
        - name: id
          in: path
          description: Identifier for measured humidity.
          required: true
          schema:
            type: string
            format: uuid
            example: "00000000-0000-0000-0000-000000000000"
      responses:
        "204":
          description: Humidity deleted.
        "404":
          $ref: "https://api.swaggerhub.com/domains/smartbear-public/ProblemDetails/1.0.0#/components/responses/NotFound"

  /api/humidities/timestamp:
    get:
      tags:
        - Humidity component.
      summary: Retrieve measured humidity by timestamp.
      operationId: getHumidityByTimestamp
      parameters:
        - name: timestamp
          in: query
          description: Timestamp for measured humidity.
          required: true
          schema:
            type: string
            format: date-time
            example: "2017-07-21T17:32:28Z"
      responses:
        "200":
          description: Humidity found.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HumidityDto"
        "404":
          $ref: "https://api.swaggerhub.com/domains/smartbear-public/ProblemDetails/1.0.0#/components/responses/NotFound"
    delete:
      tags:
