      summary: Retrieve measured humidity by id.
      description: Retrieves the measured humidity from the Arduino device by id.
      operationId: getHumidityById
      parameters:
        - $ref: "#/components/parameters/Id"
      responses:
        "200":
          description: Humidity found.
          headers:
            X-RateLimit-Limit:
              $ref: "#/components/headers/X-RateLimit-Limit"
            X-RateLimit-Remaining:
              $ref: "#/components/headers/X-RateLimit-Remaining"
            X-RateLimit-Reset:
              $ref: "#/components/headers/X-RateLimit-Reset"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HumidityDto"
              examples:
                humidity:
                  $ref: "#/components/examples/Humidity"
        "401":
          description: Unauthorized.
          $ref: "#/components/responses/ProblemDetails"
          examples:
            unauthorized:
              $ref: "#/components/examples/Unauthorized"
        "403":
