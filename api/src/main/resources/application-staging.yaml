spring:
  datasource:
    driver-class-name: org.postgresql.Driver
    username: postgres-local
    password: postgres-local
    url: jdbc:postgresql://localhost:5432/arduinothermohygrometer-local

springdoc:
  api-docs:
    enabled: false
  swagger-ui:
    enabled: false
  servers:
    - url: http://{host}:{port}
      description: Staging server.
      variables:
        host:
          default: localhost
          enum: [ localhost ]
        port:
          default: 5000
          enum: [ 5000 ]